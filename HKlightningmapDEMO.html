<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #0d0d1a; font-family: 'Courier New', monospace; }
#wrap { position: relative; width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
#map { flex: 1; width: 100%; touch-action: pan-x pan-y; }

/* ── Radar panel ── */
#radar-panel {
  position: absolute; top: 5px; right: 10px; z-index: 1000;
  display: flex; flex-direction: column; gap: 6px;
  background: rgba(8,8,18,0.9); border: 0.5px solid rgba(100,180,255,0.25);
  border-radius: 14px; padding: 8px 12px; min-width: 200px; max-width: calc(100vw - 20px);
  backdrop-filter: blur(6px);
}
#radar-top-row { display: flex; align-items: center; gap: 7px; }
#radar-toggle {
  background: transparent; border: 0.5px solid rgba(100,180,255,0.4);
  color: #88ccff; font-size: 11px; padding: 3px 10px; border-radius: 12px;
  cursor: pointer; transition: all 0.15s; opacity: 0.6; flex-shrink: 0;
}
#radar-toggle.active { background: rgba(100,180,255,0.15); border-color: #88ccff; opacity: 1; }
#radar-toggle:hover { background: rgba(100,180,255,0.1); opacity: 1; }
#radarStatus { font-size: 10px; color: #88ccff; flex: 1; text-align: right; }
#radar-controls { display: none; flex-direction: column; gap: 5px; }
#radar-controls.visible { display: flex; }
#radar-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
#rv-play-btn {
  background: transparent; border: 0.5px solid rgba(100,180,255,0.4); color: #88ccff;
  font-size: 13px; width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#rv-scrub { flex: 1; min-width: 60px; accent-color: #88ccff; cursor: pointer; }
#rv-time-label { font-size: 10px; color: #88ccff; min-width: 46px; text-align: right; white-space: nowrap; }
#rv-opacity { width: 55px; accent-color: #88ccff; cursor: pointer; }

/* ── Toolbar ── */
#toolbar {
  position: absolute; top: 70px; right: 10px; z-index: 1000;
  display: flex; gap: 4px; flex-wrap: nowrap;
  background: rgba(8,8,18,0.9); border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 5px 10px; align-items: center;
  backdrop-filter: blur(6px); max-width: calc(100vw - 20px);
  overflow-x: auto; scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }
.tb-btn { background: transparent; border: 0.5px solid rgba(255,255,255,0.2); color: #ccc; font-size: 11px; padding: 6px 12px; border-radius: 12px; cursor: pointer; transition: all 0.15s; min-height: 32px; position: relative; overflow: hidden; }
.tb-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }
.tb-btn.active { border-color: #b864ff; color: #b864ff; }
.tb-btn .tb-fill { position: absolute; inset: 0; background: rgba(180,100,255,0.22); width: 100%; transform-origin: left; transition: transform 1s linear; z-index: 0; }
.tb-btn .tb-label { position: relative; z-index: 1; }
.sep { width: 1px; height: 16px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
#gps-btn { background: transparent; border: 0.5px solid rgba(0,255,150,0.4); color: #00ff96; font-size: 11px; padding: 6px 12px; border-radius: 12px; cursor: pointer; transition: all 0.15s; min-height: 32px; }
#gps-btn.active { background: rgba(0,255,150,0.15); border-color: #00ff96; }
#gps-btn.searching { border-color: #ffaa00; color: #ffaa00; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

/* ── Status bar ── */
#status {
  flex-shrink: 0; width: 100%; z-index: 1000;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  font-size: 11px; padding: 5px 10px;
  padding-bottom: calc(5px + env(safe-area-inset-bottom));
  background: rgba(8,8,18,0.88); border-top: 0.5px solid rgba(255,255,255,0.08);
  color: #aaa; backdrop-filter: blur(4px);
}
#counter { font-size: 14px; font-weight: 600; color: #ffdd00; letter-spacing: 0.04em; }
#connStatus { color: #ffaa00; }
#gpsStatus { color: #00ff96; font-size: 10px; }
.legend { display: flex; gap: 8px; align-items: center; margin-left: auto; }
.leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.leg-item { display: flex; gap: 4px; align-items: center; font-size: 10px; color: #888; }

/* ── Region info panel ── */
#region-panel {
  position: absolute; top: 130px; left: 10px; z-index: 1000;
  background: rgba(8,8,18,0.88); border: 0.5px solid rgba(255,220,0,0.25);
  border-radius: 10px; padding: 8px 12px; min-width: 130px;
  backdrop-filter: blur(6px); font-size: 11px; color: #888;
}
#region-panel .title {
  font-size: 10px; color: #ffdd00; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 5px; border-bottom: 0.5px solid rgba(255,220,0,0.2); padding-bottom: 4px;
}
#region-total { font-size: 20px; font-weight: 700; color: #ffdd00; line-height: 1; }
#region-label { font-size: 9px; color: #888; margin-top: 2px; }

/* ── GPS marker ── */
.gps-dot { width:14px; height:14px; border-radius:50%; background:#00ff96; border:2px solid #fff; box-shadow:0 0 10px #00ff96; }
.gps-dot-fake { width:14px; height:14px; border-radius:50%; background:#ffdd00; border:2px solid #fff; box-shadow:0 0 10px #ffdd00; }
.gps-ring { width:40px; height:40px; border-radius:50%; border:2px solid rgba(0,255,150,0.4); animation:gps-expand 2s ease-out infinite; }
@keyframes gps-expand { 0%{transform:scale(0.3);opacity:0.8}100%{transform:scale(1);opacity:0} }

/* ── Context menu ── */
#mapContextMenu {
  display: none; position: fixed; z-index: 9000;
  background: #181c26; border: 1px solid #2a3045;
  border-radius: 8px; padding: 4px 0; min-width: 180px;
  font-family: 'Courier New', monospace; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
#ctxCoords { padding: 8px 14px; font-size: 12px; color: #88ccff; cursor: pointer; transition: background 0.1s; }
#ctxCoords:hover { background: rgba(100,180,255,0.1); }


@media (max-width: 480px) {
  #precip-legend { bottom: 80px; }
}
.strike-popup .leaflet-popup-content-wrapper {
  background: rgba(8,8,18,0.95); border: 0.5px solid rgba(255,220,0,0.3);
  border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
}
.strike-popup .leaflet-popup-tip { background: rgba(8,8,18,0.95); }
.strike-popup .leaflet-popup-close-button { color: #666; }
</style>
</head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map — Hong Kong centred, zoom 9 ≈ 200 km view ─────────────
const map = L.map('map', { zoomControl:true, attributionControl:true, preferCanvas:true })
  .setView([22.3, 114.2], 8);

const BASEMAPS = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  }),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution:'Tiles &copy; Esri', maxZoom:19
  }),
  street: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
  })
};
const BASEMAP_LABELS = {dark:'🌙 Dark', sat:'🌍 Sat', street:'🗺 Street'};
const BASEMAP_ORDER = ['dark','sat','street'];
let lightningScheme='dark';
let currentBasemap=localStorage.getItem('basemap')||'dark';
BASEMAPS[currentBasemap].addTo(map);
document.getElementById('basemap-btn').textContent=BASEMAP_LABELS[currentBasemap];
  
function setBasemap(name){
  if(!BASEMAPS[name]||name===currentBasemap)return;
  map.removeLayer(BASEMAPS[currentBasemap]);
  currentBasemap=name;
  BASEMAPS[currentBasemap].addTo(map);
  document.getElementById('basemap-btn').textContent=BASEMAP_LABELS[name];
  lightningScheme=name==='street'?'light':'dark';
  const legNew=document.getElementById('leg-dot-new'), leg1m=document.getElementById('leg-dot-1m');
  legNew.style.background=lightningScheme==='light'?'#101025':'#ffffff';
  legNew.style.boxShadow=lightningScheme==='light'?'0 0 4px #101025':'0 0 4px #fff';
  leg1m.style.background=lightningScheme==='light'?'#cc9900':'#ffee00';
  updateColors();
}


function cycleBasemap(){
  const idx=BASEMAP_ORDER.indexOf(currentBasemap);
  setBasemap(BASEMAP_ORDER[(idx+1)%BASEMAP_ORDER.length]);
  localStorage.setItem('basemap',currentBasemap);
}

document.getElementById('basemap-btn').addEventListener('click',cycleBasemap);

map.createPane('rvRadar'); map.getPane('rvRadar').style.zIndex = 350;
map.createPane('gps');     map.getPane('gps').style.zIndex     = 600;
map.createPane('strikes'); map.getPane('strikes').style.zIndex = 650;
map.createPane('hko');     map.getPane('hko').style.zIndex     = 640;




const canvasRenderer = L.canvas({ pane:'strikes', tolerance:5 });

window.addEventListener('error', function(e){
  console.warn('[crash guard]', e.message);
  try {
    const sp = map.getPane('strikes');
    if(sp) sp.style.zIndex = 650;
    map.invalidateSize();
  } catch(ex){}
});

window.addEventListener('unhandledrejection', function(e){
  console.warn('[unhandled promise]', e.reason);
  e.preventDefault();
});

map.on('click', function(e){
  if(!strokes.length) return;
  const clickLL=e.latlng;
  const clickPx=map.latLngToContainerPoint(clickLL);
  const TOLERANCE=12; // px
  let best=null, bestDist=Infinity;
  strokes.forEach(m=>{
    const mPx=map.latLngToContainerPoint([m._lat,m._lon]);
    const dx=mPx.x-clickPx.x, dy=mPx.y-clickPx.y;
    const px=Math.sqrt(dx*dx+dy*dy);
    if(px<TOLERANCE&&px<bestDist){bestDist=px;best=m;}
  });
  if(!best) return;
  const now=t||Date.now()/1000;
  const age=now-best._strokeTime;
  // Format time (always Hong Kong time, regardless of viewer's device timezone)
  const d=new Date(best._strokeTime*1000);
  const dateStr=d.toLocaleDateString('en-CA',{month:'short',day:'numeric',timeZone:'Asia/Hong_Kong'});
  const timeStr=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Hong_Kong'})+' HKT';
  // Age string
  let ageStr;
  if(age<60) ageStr=Math.round(age)+'s ago';
  else if(age<3600) ageStr=Math.round(age/60)+'m ago';
  else if(age<86400) ageStr=Math.round(age/3600*10)/10+'h ago';
  else ageStr=Math.round(age/86400)+'d ago';
  // Distance & bearing to GPS
  const src=gpsMarker?gpsMarker.getLatLng():_gpsLastLL;
  let distStr='', bearStr='';
  if(src){
    const slat=src.lat, slon=src.lng??src.lon;
    const km=haversineKm(slat,slon,best._lat,best._lon);
    distStr=km<1?(km*1000).toFixed(0)+' m':km.toFixed(1)+' km';
    // Bearing from GPS to strike
    const φ1=slat*Math.PI/180, φ2=best._lat*Math.PI/180;
    const dλ=(best._lon-slon)*Math.PI/180;
    const y=Math.sin(dλ)*Math.cos(φ2);
    const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dλ);
    const brng=(Math.atan2(y,x)*180/Math.PI+360)%360;
    const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    const dir=dirs[Math.round(brng/22.5)%16];
    bearStr=Math.round(brng)+'° '+dir;
  }
  const popupContent=
    '<div style="font-family:monospace;font-size:11px;line-height:1.8;color:#ccc;min-width:160px;">'+
    '<div style="font-size:12px;font-weight:700;color:#ffdd00;margin-bottom:4px;">⚡ Lightning Strike</div>'+
    '<div>🕐 '+timeStr+'</div>'+
    '<div>📅 '+dateStr+' ('+ageStr+')</div>'+
    '<div>📍 '+best._lat.toFixed(4)+'°, '+best._lon.toFixed(4)+'°</div>'+
    (distStr?'<div>📏 '+distStr+' from you</div>':'')+
    (bearStr?'<div>🧭 '+bearStr+'</div>':'')+
    '</div>';
  L.popup({closeButton:true,className:'strike-popup'})
    .setLatLng([best._lat,best._lon])
    .setContent(popupContent)
    .openOn(map);
});
  
const hkoRenderer = L.canvas({ pane:'hko' });

map.on('click', function(e){
  if(!hkoEnabled || !hkoMarkers.length) return;
  const clickLL=e.latlng;
  const clickPx=map.latLngToContainerPoint(clickLL);
  const TOLERANCE=12; // px
  let best=null, bestDist=Infinity;
  hkoMarkers.forEach(m=>{
    const mPx=map.latLngToContainerPoint([m._lat,m._lon]);
    const dx=mPx.x-clickPx.x, dy=mPx.y-clickPx.y;
    const px=Math.sqrt(dx*dx+dy*dy);
    if(px<TOLERANCE&&px<bestDist){bestDist=px;best=m;}
  });
  if(!best) return;
  const nowSec=Date.now()/1000;
  const age=nowSec-best._hkoBinEnd;
  const d=new Date(best._hkoBinEnd*1000);
  const dateStr=d.toLocaleDateString('en-CA',{month:'short',day:'numeric',timeZone:'Asia/Hong_Kong'});
  const timeStr=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Hong_Kong'})+' HKT';
  let ageStr;
  if(age<60) ageStr=Math.round(age)+'s ago';
  else if(age<3600) ageStr=Math.round(age/60)+'m ago';
  else if(age<86400) ageStr=Math.round(age/3600*10)/10+'h ago';
  else ageStr=Math.round(age/86400)+'d ago';
  const src=gpsMarker?gpsMarker.getLatLng():_gpsLastLL;
  let distStr='', bearStr='';
  if(src){
    const slat=src.lat, slon=src.lng??src.lon;
    const km=haversineKm(slat,slon,best._lat,best._lon);
    distStr=km<1?(km*1000).toFixed(0)+' m':km.toFixed(1)+' km';
    const φ1=slat*Math.PI/180, φ2=best._lat*Math.PI/180;
    const dλ=(best._lon-slon)*Math.PI/180;
    const y=Math.sin(dλ)*Math.cos(φ2);
    const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(dλ);
    const brng=(Math.atan2(y,x)*180/Math.PI+360)%360;
    const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    const dir=dirs[Math.round(brng/22.5)%16];
    bearStr=Math.round(brng)+'° '+dir;
  }
  const popupContent=
    '<div style="font-family:monospace;font-size:11px;line-height:1.8;color:#ccc;min-width:160px;">'+
    '<div style="font-size:12px;font-weight:700;color:#b864ff;margin-bottom:4px;">🛰 HKO Lightning</div>'+
    '<div>🕐 '+timeStr+'</div>'+
    '<div>📅 '+dateStr+' ('+ageStr+')</div>'+
    '<div>📍 '+best._lat.toFixed(4)+'°, '+best._lon.toFixed(4)+'°</div>'+
    (distStr?'<div>📏 '+distStr+' from you</div>':'')+
    (bearStr?'<div>🧭 '+bearStr+'</div>':'')+
    '</div>';
  L.popup({closeButton:true,className:'strike-popup'})
    .setLatLng([best._lat,best._lon])
    .setContent(popupContent)
    .openOn(map);
});

// ── Lightning core ─────────────────────────────────────────────
let windowSec = 86400, t = 0, ws = null;
const MAX = 8000;
const strokes = [];
const archive = [];
const ARCHIVE_MAX = 100000;

function strokeStyle(age){
  const newColor=lightningScheme==='light'?'#101025':'#ffffff';
  const minColor=lightningScheme==='light'?'#cc9900':'#ffee00';
  if(age<10)    return{color:newColor,fillColor:newColor,opacity:1.0, fillOpacity:1.0, radius:5};
  if(age<60)    return{color:minColor,fillColor:minColor,opacity:0.9, fillOpacity:0.9, radius:4};
  if(age<600)   return{color:'#ff8800',fillColor:'#ff8800',opacity:0.75,fillOpacity:0.75,radius:3};
  if(age<1800)  return{color:'#ff3300',fillColor:'#ff3300',opacity:0.55,fillOpacity:0.55,radius:2.5};
  if(age<3600)  return{color:'#cc2200',fillColor:'#cc2200',opacity:0.4, fillOpacity:0.4, radius:2};
  if(age<21600) return{color:'#882200',fillColor:'#882200',opacity:0.3, fillOpacity:0.3, radius:2};
  if(age<43200) return{color:'#661100',fillColor:'#661100',opacity:0.22,fillOpacity:0.22,radius:1.8};
  return              {color:'#441100',fillColor:'#441100',opacity:0.15,fillOpacity:0.15,radius:1.5};
}


function addStroke(lat,lon,time){
  try {
  const now=t||Date.now()/1000;
  const age=now-time;
  if(archive.length>=ARCHIVE_MAX) archive.shift();
  archive.push({lat,lon,time});
  if(age>windowSec) return;
  const m=L.circleMarker([lat,lon],{
    ...strokeStyle(age),weight:0,interactive:false,renderer:canvasRenderer,pane:'strikes'
  }).addTo(map);
  m._strokeTime=time; m._lat=lat; m._lon=lon;
  strokes.push(m);
  if(strokes.length>MAX){ const old=strokes.shift(); map.removeLayer(old); }

  document.getElementById('counter').textContent=strokes.length;
  updateRegionCount();
  } catch(e){ console.warn('[addStroke]',e); }
}
function updateColors(){
  const now=t||Date.now()/1000;
  for(let i=strokes.length-1;i>=0;i--){
    const age=now-strokes[i]._strokeTime;
    if(age>windowSec){map.removeLayer(strokes[i]);strokes.splice(i,1);continue;}
    strokes[i].setStyle(strokeStyle(age));
  }
}

function updateRegionCount(){
  const bounds=map.getBounds();
  let count=0;
  const now=t||Date.now()/1000;
  strokes.forEach(m=>{if((now-m._strokeTime)<=windowSec&&bounds.contains([m._lat,m._lon]))count++;});
  document.getElementById('region-total').textContent=count;
}


setInterval(()=>{
  try{updateColors();}catch(e){console.warn('[updateColors]',e);}
  try{updateRegionCount();}catch(e){console.warn('[updateRegionCount]',e);}
  try{checkLightningProximity();}catch(e){console.warn('[checkLightningProximity]',e);}
},2000);

let _zoomThrottle=null;
map.on('zoomanim zoom', function(){
  if(_zoomThrottle) return;
  _zoomThrottle=setTimeout(()=>{_zoomThrottle=null;},100);
});
map.on('moveend zoomend', updateRegionCount);

// ── Lightning Proximity Warning ────────────────────────────────
const PROX_RADIUS_KM=1000, PROX_WARNING_PCT=0.25;   //100km default, 10000km DEMO
const PROX_WARNING_KM=PROX_RADIUS_KM*PROX_WARNING_PCT;
const PROX_VIBRATE_MS=[200,100,200,100,200];
let proximityRing=null,proximityWarning=null,proximityActive=false;
let _proxLastWasWarning=false;
let _proxLastStrikeTime=-Infinity,_proxFadeTimer=null,_proxDisplayStart=null,_proxVibratedKey=null;
let _proxLastRenderedKey='';
const _proxWarnedKeys=new Set();   // banner shown this cycle; cleared only when all strikes leave
const _proxVibratedKeys=new Set(); // vibrated this cycle; cleared only when all strikes leave
let _gpsLastLL=null;



function triggerProximityVibrate(){
  if(!navigator.vibrate) return;
  navigator.vibrate(PROX_VIBRATE_MS);
}
  
function haversineKm(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

const PROX_FADE_DELAY_MS=5000;
function startProxCountdownFill(){
  const fill=document.getElementById('prox-countdown-fill');
  if(!fill) return;
  fill.style.transition='none';
  fill.style.width='100%';
  void fill.offsetWidth;
  requestAnimationFrame(()=>{
    fill.style.transition='width '+PROX_FADE_DELAY_MS+'ms linear';
    fill.style.width='0%';
  });
}

function checkLightningProximity(){
  const src=gpsMarker?gpsMarker.getLatLng():_gpsLastLL||{lat:22.3193,lon:114.1694};
  if(!src)return;
  const lat=src.lat,lon=src.lng??src.lon;
  const now=t||Date.now()/1000;
  const nowSec=Date.now()/1000;
  let closest=Infinity,count=0;
  window._proxNearestLL=null;
  let newestWarningLL=null,closestWarningDist=Infinity;
  let newestCautionLL=null,closestCautionDist=Infinity;
  strokes.forEach(m=>{
    if((now-m._strokeTime)>60)return;
    const d=haversineKm(lat,lon,m._lat,m._lon);
    if(d<=PROX_RADIUS_KM){
      count++;if(d<closest)closest=d;
if(d<=PROX_WARNING_KM){if(d<closestWarningDist){closestWarningDist=d;newestWarningLL={lat:m._lat,lon:m._lon,key:'ws_'+m._strokeTime+'_'+m._lat+'_'+m._lon};}}
      else{if(d<closestCautionDist){closestCautionDist=d;newestCautionLL={lat:m._lat,lon:m._lon};}}
    }
  });
  if(hkoEnabled){
    hkoMarkers.forEach(m=>{
      if((nowSec-m._hkoBinEnd)>600)return;
      const d=haversineKm(lat,lon,m._lat,m._lon);
      if(d<=PROX_RADIUS_KM){
        count++;if(d<closest)closest=d;
if(d<=PROX_WARNING_KM){if(d<closestWarningDist){closestWarningDist=d;newestWarningLL={lat:m._lat,lon:m._lon,key:'hko_'+m._hkoBinEnd+'_'+m._lat+'_'+m._lon};}}
        else{if(d<closestCautionDist){closestCautionDist=d;newestCautionLL={lat:m._lat,lon:m._lon};}}
      }
    });
  }
  window._proxNearestLL=newestWarningLL||newestCautionLL;
  const hasNewStrike=(newestWarningLL||newestCautionLL)?true:false;
  if(hasNewStrike){_proxLastStrikeTime=t||Date.now()/1000;if(_proxFadeTimer){clearTimeout(_proxFadeTimer);_proxFadeTimer=null;}}
if(count>0 && _proxDisplayStart===null) _proxDisplayStart=nowSec;
  const _proxElapsed=_proxDisplayStart!==null?(nowSec-_proxDisplayStart):0;
  if(count>0 && _proxElapsed<10){
const isWarning=closest<=PROX_WARNING_KM;
const vibrateKey=newestWarningLL?newestWarningLL.key:(newestCautionLL?'cau_'+newestCautionLL.lat.toFixed(4)+'_'+newestCautionLL.lon.toFixed(4):null);
    if(vibrateKey&&!_proxVibratedKeys.has(vibrateKey)){
      if(isWarning) triggerProximityVibrate();
      _proxVibratedKey=vibrateKey;
      _proxVibratedKeys.add(vibrateKey);
    }
    _proxLastWasWarning=isWarning;
const renderKey=isWarning+'|'+count+'|'+closest.toFixed(1)+'|'+(window._proxNearestLL?window._proxNearestLL.lat.toFixed(4)+','+window._proxNearestLL.lon.toFixed(4):'');
    // Suppress re-display if the closest warning key was already shown this cycle
    const suppressKey=newestWarningLL?newestWarningLL.key:(newestCautionLL?'cau_'+newestCautionLL.lat.toFixed(4)+'_'+newestCautionLL.lon.toFixed(4):null);
if(renderKey===_proxLastRenderedKey&&proximityWarning)return;
    if(suppressKey&&_proxWarnedKeys.has(suppressKey))return;
    if(suppressKey) _proxWarnedKeys.add(suppressKey);
    _proxLastRenderedKey=renderKey;
    const lineColor=isWarning?'#ff4400':'#ffdd00';
    if(!window._proxNearestLine){
      window._proxNearestLine=L.polyline([[lat,lon],[window._proxNearestLL.lat,window._proxNearestLL.lon]],{color:lineColor,weight:2,opacity:0.85,dashArray:'6 5',interactive:false,pane:'gps'}).addTo(map);
    }else{window._proxNearestLine.setLatLngs([[lat,lon],[window._proxNearestLL.lat,window._proxNearestLL.lon]]);window._proxNearestLine.setStyle({color:lineColor});}
    const midLat=(lat+window._proxNearestLL.lat)/2,midLon=(lon+window._proxNearestLL.lon)/2;
    const distLabel=closest>=100?Math.round(closest)+' km':closest.toFixed(1)+' km';
    if(!window._proxDistLabel){
      window._proxDistLabel=L.marker([midLat,midLon],{interactive:false,pane:'gps',icon:L.divIcon({className:'',html:'<div id="prox-dist-label" style="color:'+lineColor+';font-size:11px;font-family:monospace;font-weight:700;white-space:nowrap;text-shadow:0 0 4px #000,0 0 4px #000;transform:translate(-50%,-50%);position:absolute;">'+distLabel+'</div>',iconSize:[0,0],iconAnchor:[0,0]})}).addTo(map);
    }else{window._proxDistLabel.setLatLng([midLat,midLon]);const el=document.getElementById('prox-dist-label');if(el){el.textContent=distLabel;el.style.color=lineColor;}}
    if(!proximityRing){proximityRing=L.circle([lat,lon],{radius:PROX_RADIUS_KM*1000,pane:'gps',color:'#ff4400',weight:2,opacity:0.7,fillColor:'#ff4400',fillOpacity:0.04,dashArray:'8 6',interactive:false}).addTo(map);}
    else proximityRing.setLatLng([lat,lon]);
const color=isWarning?'#cc2200':'#a16207';
    const label=isWarning?'⚡ LIGHTNING WARNING':'⚡ LIGHTNING CAUTION';
    if(!proximityWarning){
      proximityWarning=document.createElement('div');
      proximityWarning.id='proximity-warning';
      proximityWarning.style.cssText='position:absolute;bottom:0;left:50%;transform:translateX(-50%);z-index:1500;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:0;min-width:260px;max-width:90vw;';
      const sty=document.createElement('style');
      sty.textContent='@keyframes proximityFadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
      document.head.appendChild(sty);
      proximityWarning.innerHTML='<div id="prox-banner" style="position:relative;border-radius:10px;padding:9px 20px;text-align:center;font-family:\'Courier New\',monospace;border:2px solid;width:100%;box-sizing:border-box;background:#e8e8e8;overflow:hidden;"><div id="prox-countdown-fill" style="position:absolute;inset:0;background:#ffffff;width:100%;border-radius:8px;pointer-events:none;"></div><div style="position:relative;"><div id="prox-label" style="font-size:14px;font-weight:800;letter-spacing:0.07em;"></div><div id="prox-detail" style="font-size:11px;font-weight:700;margin-top:3px;"></div><div id="prox-time" style="font-size:9px;font-weight:600;margin-top:2px;color:#555;"></div></div></div>';
      proximityWarning.style.animation='proximityFadeIn 0.3s ease';
      document.getElementById('map').appendChild(proximityWarning);
      proximityActive=true;
      startProxCountdownFill();
    }
    const banner=document.getElementById('prox-banner');
    banner.style.background='#e8e8e8';
    banner.style.borderColor=color;
    banner.style.animation='none';
    document.getElementById('prox-label').style.color=color;
    document.getElementById('prox-label').textContent=label;
    document.getElementById('prox-detail').style.color=color;
    document.getElementById('prox-detail').textContent=count+' strike'+(count>1?'s':'')+' within '+PROX_RADIUS_KM+' km · closest '+closest.toFixed(1)+' km';
    const nowD=new Date();
    document.getElementById('prox-time').textContent='Updated '+nowD.toLocaleTimeString('en-HK',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Hong_Kong'})+' HKT';
if(!_proxFadeTimer){_proxFadeTimer=setTimeout(()=>{
      if(proximityRing){map.removeLayer(proximityRing);proximityRing=null;}
      if(proximityWarning){proximityWarning.remove();proximityWarning=null;}
      if(window._proxNearestLine){map.removeLayer(window._proxNearestLine);window._proxNearestLine=null;}
      if(window._proxDistLabel){map.removeLayer(window._proxDistLabel);window._proxDistLabel=null;}
      proximityActive=false;_proxFadeTimer=null;_proxLastRenderedKey='';
      _proxDisplayStart=null; // reset so elapsed gate doesn't expire and trigger else-branch clear
    },PROX_FADE_DELAY_MS);}
  } else {
    if(proximityRing){map.removeLayer(proximityRing);proximityRing=null;}
    if(proximityWarning){proximityWarning.remove();proximityWarning=null;}
    if(window._proxNearestLine){map.removeLayer(window._proxNearestLine);window._proxNearestLine=null;}
    if(window._proxDistLabel){map.removeLayer(window._proxDistLabel);window._proxDistLabel=null;}
if(_proxFadeTimer){clearTimeout(_proxFadeTimer);_proxFadeTimer=null;}
    _proxLastStrikeTime=-Infinity;_proxLastWasWarning=false;_proxLastRenderedKey='';proximityActive=false;_proxDisplayStart=null;
_proxWarnedKeys.clear();   // strikes truly gone — reset for next event
    _proxVibratedKeys.clear();
    _proxDisplayStart=null;
  }
}

// ── RainViewer Radar ───────────────────────────────────────────
// Same source as Windy. Free, no API key, full CORS, global coverage.
// API: https://api.rainviewer.com/public/weather-maps.json
const RV_COLOR = 2;   // 2 = original RainViewer palette (green→yellow→red)
let rvEnabled = false, rvFrames = [], rvLayers = [];
let rvFrameIdx = 0, rvAnimTimer = null, rvRefreshTimer = null;
let rvPlaying = true;
let rvOpacity = 0.30;
const RV_ANIM_MS = 500;

async function rvFetchFrames(){
  try{
    const res=await fetch('https://api.rainviewer.com/public/weather-maps.json',{signal:AbortSignal.timeout(10000)});
    const data=await res.json();
    return (data.radar?.past||[]).map(f=>({path:f.path,time:f.time,host:data.host}));
  }catch(e){console.warn('[RainViewer]',e);return[];}
}

function rvShowFrame(idx){
  rvLayers.forEach((l,i)=>l.setOpacity(i===idx?rvOpacity:0));
  rvFrameIdx=idx; rvUpdateUI();
}

function rvStartAnim(){
  if(rvAnimTimer)clearInterval(rvAnimTimer);
  rvAnimTimer=setInterval(()=>{if(!rvLayers.length)return;rvShowFrame((rvFrameIdx+1)%rvLayers.length);},RV_ANIM_MS);
}

function rvStopAnim(){if(rvAnimTimer){clearInterval(rvAnimTimer);rvAnimTimer=null;}}

function rvUpdateUI(){
  const f=rvFrames[rvFrameIdx];
  if(f){
    const d=new Date(f.time*1000);
    const hh=String((d.getUTCHours()+8)%24).padStart(2,'0');
    const mm=String(d.getUTCMinutes()).padStart(2,'0');
    document.getElementById('rv-time-label').textContent=hh+':'+mm+' HKT';
    document.getElementById('rv-scrub').value=rvFrameIdx;
  }
  document.getElementById('rv-play-btn').textContent=rvPlaying?'⏸':'▶';
  document.getElementById('radarStatus').textContent=rvEnabled?(rvFrames.length+' frames'):'';
}

async function rvBuild(){
  rvLayers.forEach(l=>{try{map.removeLayer(l);}catch(e){}});
  rvLayers=[];
  document.getElementById('radarStatus').textContent='⟳ Loading…';
  rvFrames=await rvFetchFrames();
  if(!rvFrames.length){document.getElementById('radarStatus').textContent='⚠ No data';return;}
  document.getElementById('rv-scrub').max=rvFrames.length-1;
let rvTileTotal=0,rvTileLoaded=0;
  function rvUpdateLoadBar(){
    if(rvTileTotal===0)return;
    const pct=Math.round((rvTileLoaded/rvTileTotal)*100);
    const fill=document.getElementById('radar-load-fill');
    const bar=document.getElementById('radar-load-bar');
    if(fill)fill.style.width=pct+'%';
    if(pct>=100){setTimeout(()=>{if(bar)bar.style.display='none';if(fill)fill.style.width='0%';rvTileTotal=0;rvTileLoaded=0;},400);}
  }
  const bar=document.getElementById('radar-load-bar');
  if(bar){bar.style.display='block';}
  rvTileTotal=0;rvTileLoaded=0;
  rvFrames.forEach(f=>{
    const url=f.host+f.path+'/512/{z}/{x}/{y}/'+RV_COLOR+'/1_1.png';
    const layer=L.tileLayer(url,{tileSize:512,opacity:0,pane:'rvRadar',interactive:false,maxNativeZoom:6,zoomOffset:-1,attribution:'Radar: <a href="https://www.rainviewer.com/">RainViewer</a>'}).addTo(map);    layer.on('tileloadstart',()=>{rvTileTotal++;rvUpdateLoadBar();});
    layer.on('tileload tileerror',()=>{rvTileLoaded++;rvUpdateLoadBar();});
    // Pre-warm HK z=4,5,6 tiles within ~200 km
    const hkTiles=[
      {z:4,x:13,y:7},{z:4,x:14,y:7},
      {z:5,x:26,y:14},{z:5,x:27,y:14},{z:5,x:26,y:15},{z:5,x:27,y:15},
      {z:6,x:52,y:28},{z:6,x:53,y:28},{z:6,x:54,y:28},
      {z:6,x:52,y:29},{z:6,x:53,y:29},{z:6,x:54,y:29},
      {z:6,x:52,y:30},{z:6,x:53,y:30},{z:6,x:54,y:30}
    ];
    hkTiles.forEach(({z,x,y})=>{
      const tUrl=f.host+f.path+'/512/'+z+'/'+x+'/'+y+'/'+RV_COLOR+'/1_1.png';
      const img=new Image(); img.src=tUrl;
    });
    rvLayers.push(layer);
  });
  rvFrameIdx=rvLayers.length-1;
  rvShowFrame(rvFrameIdx);
  if(rvPlaying)rvStartAnim();
}

function enableRadar(){
  rvEnabled=true;
  document.getElementById('radar-toggle').classList.add('active');
  document.getElementById('radar-controls').classList.add('visible');
  rvBuild();
  if(rvRefreshTimer)clearInterval(rvRefreshTimer);
  rvRefreshTimer=setInterval(()=>{if(rvEnabled)rvBuild();},5*60*1000);
}

function disableRadar(){
  rvEnabled=false;
  document.getElementById('radar-toggle').classList.remove('active');
  document.getElementById('radar-controls').classList.remove('visible');
  document.getElementById('radarStatus').textContent='';
  rvStopAnim();
  if(rvRefreshTimer){clearInterval(rvRefreshTimer);rvRefreshTimer=null;}
  rvLayers.forEach(l=>{try{map.removeLayer(l);}catch(e){}});
  rvLayers=[];rvFrames=[];
}

document.getElementById('radar-toggle').addEventListener('click',()=>{if(rvEnabled)disableRadar();else enableRadar();});
document.getElementById('rv-play-btn').addEventListener('click',()=>{
  rvPlaying=!rvPlaying;
  if(rvPlaying)rvStartAnim();else rvStopAnim();
  rvUpdateUI();
});
document.getElementById('rv-scrub').addEventListener('input',function(){
  rvStopAnim();rvPlaying=false;rvShowFrame(parseInt(this.value));rvUpdateUI();
});
document.getElementById('rv-opacity').addEventListener('input',function(){
  rvOpacity=parseInt(this.value)/100;
  if(rvLayers[rvFrameIdx])rvLayers[rvFrameIdx].setOpacity(rvOpacity);
});

// Auto-start radar on load

// ── GPS ────────────────────────────────────────────────────────
let gpsMarker=null,gpsRing=null,gpsAccCircle=null,gpsHeadingLine=null,gpsCompassLine=null,gpsCompassTicks=[],gpsActive=false,gpsWatchId=null;
let _gpsPrev=null;
const gpsIcon=L.divIcon({className:'',html:'<div class="gps-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]});
const gpsRingIcon=L.divIcon({className:'',html:'<div class="gps-ring"></div>',iconSize:[40,40],iconAnchor:[20,20]});

function _destPoint(lat,lon,bearingDeg,distKm){
  const R=6371,b=bearingDeg*Math.PI/180,φ1=lat*Math.PI/180,λ1=lon*Math.PI/180,d=distKm/R;
  const φ2=Math.asin(Math.sin(φ1)*Math.cos(d)+Math.cos(φ1)*Math.sin(d)*Math.cos(b));
  const λ2=λ1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(φ1),Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
  return[φ2*180/Math.PI,λ2*180/Math.PI];
}

function onGPSSuccess(pos){
  const{latitude:lat,longitude:lon,accuracy,heading,speed}=pos.coords;
  _devLastGpsHeading=(heading!==null&&!isNaN(heading)&&heading>=0)?heading:null;
  _devLastGpsSpeedKmh=(speed!=null&&!isNaN(speed))?speed*3.6:0;
  devTryRecord();
  document.getElementById('gps-btn').classList.remove('searching');
  document.getElementById('gps-btn').classList.add('active');
  document.getElementById('gps-btn').textContent='⊕ GPS';
  const accStr=accuracy<1000?'±'+Math.round(accuracy)+'m':'±'+(accuracy/1000).toFixed(1)+'km';
  let bear=null;
  if(heading!==null&&!isNaN(heading)&&heading>=0)bear=heading;
  else if(_gpsPrev){const dLat=lat-_gpsPrev.lat,dLon=lon-_gpsPrev.lon;const dist=Math.sqrt(dLat*dLat+dLon*dLon);if(dist>0.00005)bear=(Math.atan2(dLon,dLat)*180/Math.PI+360)%360;}
  _gpsPrev={lat,lon};
  const spdStr=speed!=null&&!isNaN(speed)?' '+(speed*3.6).toFixed(0)+'km/h':'';
  const bearStr=bear!=null?' '+Math.round(bear)+'°':'';
  document.getElementById('gpsStatus').textContent='📍 '+lat.toFixed(4)+', '+lon.toFixed(4)+' '+accStr+spdStr+bearStr;
  _gpsLastLL={lat,lon};
if(!gpsMarker){
    _hideCompassRings();
    gpsRing=L.marker([lat,lon],{icon:gpsRingIcon,interactive:false,pane:'gps'}).addTo(map);
    gpsMarker=L.marker([lat,lon],{icon:gpsIcon,interactive:false,pane:'gps'}).addTo(map);
    gpsAccCircle=L.circle([lat,lon],{radius:accuracy,pane:'gps',color:'#00ff96',fillColor:'#00ff96',fillOpacity:0.04,weight:1,opacity:0.3,interactive:false}).addTo(map);
    map.setView([lat,lon],Math.max(map.getZoom(),7));
  }else{gpsMarker.setLatLng([lat,lon]);gpsRing.setLatLng([lat,lon]);gpsAccCircle.setLatLng([lat,lon]).setRadius(accuracy);}
  if(bear!=null){
    const speedKmh=(speed!=null&&!isNaN(speed)&&speed>0)?speed*3.6:1;
    const totalDist=speedKmh||100;
    const tip=_destPoint(lat,lon,bear,totalDist);
    if(!gpsHeadingLine)gpsHeadingLine=L.polyline([[lat,lon],tip],{color:'#ff2222',weight:2.5,opacity:0.85,interactive:false,pane:'gps'}).addTo(map);
    else gpsHeadingLine.setLatLngs([[lat,lon],tip]);
    const perpBear=(bear+90)%360;
    if(!gpsHeadingLine._ticks)gpsHeadingLine._ticks=[];
    gpsHeadingLine._ticks.forEach(tk=>map.removeLayer(tk));gpsHeadingLine._ticks=[];
    const tickWidthKm=speedKmh*(15/60);
    [15,30,45,60].forEach(mins=>{
      const dist=speedKmh*(mins/60);
      const mid=_destPoint(lat,lon,bear,dist);
      const a=_destPoint(mid[0],mid[1],perpBear,tickWidthKm/2);
      const b=_destPoint(mid[0],mid[1],(perpBear+180)%360,tickWidthKm/2);
      const tick=L.polyline([a,b],{color:'#ff2222',weight:1.5,opacity:0.7,interactive:false,pane:'gps'}).addTo(map);
      gpsHeadingLine._ticks.push(tick);
      if(mins===60)gpsHeadingLine._ticks.push(L.marker(mid,{interactive:false,pane:'gps',icon:L.divIcon({className:'',html:'<span style="color:#ff4444;font-size:9px;font-family:monospace;white-space:nowrap;text-shadow:0 0 3px #000;">60min GPS</span>',iconAnchor:[-4,12]})}).addTo(map));
    });
  }else if(gpsHeadingLine){gpsHeadingLine._ticks&&gpsHeadingLine._ticks.forEach(tk=>map.removeLayer(tk));map.removeLayer(gpsHeadingLine);gpsHeadingLine=null;}
  if(!gpsCompassLine) _showCompassRings(lat,lon);
}
function onGPSError(err){

  document.getElementById('gps-btn').textContent='⊕ GPS';

  document.getElementById('gpsStatus').textContent='⚠ '+msg;

}


let _compassRings=[];

function _hideCompassRings(){

}
// ── Compass Deviation Calibration ─────────────────────────────
const DEV_N_DIRS=16, DEV_DIR_STEP=360/16;
const DEV_STEADY_SEC=5, DEV_STEADY_TOL=5, DEV_SPEED_MIN=3, DEV_DIR_TOL=5;
const DEV_REC_THROTTLE_MS=2000;
const DEV_STORAGE_KEY='compass_deviations_v1';
const ROSE_MIN_SAMPLES=3;

let deviationTable=Array.from({length:DEV_N_DIRS},()=>[]);
let devManualRaw=false;
let roseBlinkOn=true, roseBlinkTimer=null;
let _roseActiveRecSector=null;
let _devSteadyStart=null, _devSteadyAnchor=null, _devLastRecAt=0;
let _devLastGpsHeading=null, _devLastGpsSpeedKmh=0;
let compassHeading=null;

function devSaveTable(){ try{ localStorage.setItem(DEV_STORAGE_KEY,JSON.stringify(deviationTable)); }catch(e){} }
function devLoadTable(){
  try{
    const raw=localStorage.getItem(DEV_STORAGE_KEY);
    if(!raw) return;
    const saved=JSON.parse(raw);
    if(Array.isArray(saved)&&saved.length===DEV_N_DIRS) saved.forEach((arr,i)=>{ if(Array.isArray(arr)) deviationTable[i]=arr; });
  }catch(e){}
}
devLoadTable();

function devAngDiff(a,b){ let d=((a-b)+360)%360; return d>180?d-360:d; }
function devSector(h){ return Math.round((((h%360)+360)%360)/DEV_DIR_STEP)%DEV_N_DIRS; }
function devNearestDirDiff(h){ return Math.abs(devAngDiff(h,devSector(h)*DEV_DIR_STEP)); }
function devAvg(arr){ return arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:null; }
function devCapturedCount(){ return deviationTable.filter(arr=>arr.length>0).length; }

function updateDevStatus(){
  const el=document.getElementById('devStatus');
  if(!el) return;
  const n=devCapturedCount();
  const total=deviationTable.reduce((s,a)=>s+a.length,0);
  if(devManualRaw){ el.textContent='🧭 Raw'; el.style.color='#ffaa00'; }
  else if(n===0){ el.textContent='🧭 Uncalibrated'; el.style.color='#888'; }
  else{ el.textContent='🧭 '+n+'/16 ('+total+' smp)'; el.style.color='#00ff96'; }
}
updateDevStatus();

function devTryRecord(){
  const now=Date.now();
  const gh=_devLastGpsHeading, ch=compassHeading, spd=_devLastGpsSpeedKmh;
  if(gh==null||ch==null||spd<DEV_SPEED_MIN){ _devSteadyStart=null; _devSteadyAnchor=null; return; }
  if(_devSteadyStart===null||_devSteadyAnchor===null){ _devSteadyStart=now; _devSteadyAnchor=gh; return; }
  const steady=Math.abs(devAngDiff(gh,_devSteadyAnchor))<=DEV_STEADY_TOL;
  if(!steady){ _devSteadyStart=now; _devSteadyAnchor=gh; return; }
  const onMark=devNearestDirDiff(gh)<=DEV_DIR_TOL;
  if(!onMark) return;
  const elapsed=(now-_devSteadyStart)/1000;
  if(elapsed<DEV_STEADY_SEC) return;
  if(now-_devLastRecAt<DEV_REC_THROTTLE_MS) return;
  const dev=devAngDiff(ch,gh);
  if(Math.abs(dev)>90) return;
  _devLastRecAt=now;
  deviationTable[devSector(gh)].push(dev);
  devSaveTable();
  updateDevStatus();
  _roseActiveRecSector=devSector(gh);
  updateRosePanel();
}

function getCorrectedHeading(rawHeading){
  if(devManualRaw) return{heading:rawHeading,corrected:false};
  const avgs=deviationTable.map(devAvg);
  const onIdx=devSector(rawHeading);
  const onMark=devNearestDirDiff(rawHeading)<=DEV_DIR_TOL;
  if(onMark&&avgs[onIdx]!==null&&deviationTable[onIdx].length>=ROSE_MIN_SAMPLES){
    return{heading:((rawHeading-avgs[onIdx])+360)%360,corrected:true};
  }
  const lowIdx=Math.floor((((rawHeading%360)+360)%360)/DEV_DIR_STEP)%DEV_N_DIRS;
  const highIdx=(lowIdx+1)%DEV_N_DIRS;
  const lowDev=avgs[lowIdx], highDev=avgs[highIdx];
  if(lowDev!==null&&highDev!==null&&deviationTable[lowIdx].length>=ROSE_MIN_SAMPLES&&deviationTable[highIdx].length>=ROSE_MIN_SAMPLES){
    const lowAng=lowIdx*DEV_DIR_STEP;
    const fromLow=(((rawHeading%360)+360)%360-lowAng+360)%360;
    const dev=lowDev+(highDev-lowDev)*(fromLow/DEV_DIR_STEP);
    return{heading:((rawHeading-dev)+360)%360,corrected:true};
  }
  const gh=_devLastGpsHeading, spd=_devLastGpsSpeedKmh;
  if(gh!==null&&spd>=DEV_SPEED_MIN&&compassHeading!==null){
    const angDiff=Math.abs(devAngDiff(rawHeading,gh));
    const steadyElapsed=_devSteadyStart!==null?(Date.now()-_devSteadyStart)/1000:0;
    if(angDiff<=DEV_STEADY_TOL&&steadyElapsed>=DEV_STEADY_SEC){
      const sector=devSector(gh);
      const dev=devAngDiff(rawHeading,gh);
      const onMark2=devNearestDirDiff(gh)<=DEV_DIR_TOL;
      if(!onMark2&&Math.abs(dev)<=90){
        const now=Date.now();
        if(now-_devLastRecAt>=DEV_REC_THROTTLE_MS){
          _devLastRecAt=now;
          deviationTable[sector].push(dev);
          devSaveTable();
          updateDevStatus();
        }
      }
      return{heading:((rawHeading-dev)+360)%360,corrected:true};
    }
  }
  return{heading:rawHeading,corrected:false};
}

// ── Deviation Rose drawing ─────────────────────────────────────
function roseWedgeColor(count,blinkOn){
  if(count<=0) return blinkOn?'#fde68a':'rgba(255,255,255,0.07)';
  if(count<ROSE_MIN_SAMPLES) return blinkOn?'#fbbf24':(count<2?'#fef08a88':'#fde04788');
  return blinkOn?'#4ade80':'#22c55e';
}

function drawDeviationRose(){
  const canvas=document.getElementById('rose-canvas-ltg');
  if(!canvas) return;
  const DPR=window.devicePixelRatio||1;
  const W=160,H=160;
  canvas.width=W*DPR; canvas.height=H*DPR;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,rOuter=W/2-18,rInner=rOuter*0.22;
  const counts=deviationTable.map(a=>a.length);
  [0.33,0.66,1].forEach(f=>{
    ctx.beginPath();ctx.arc(cx,cy,rInner+(rOuter-rInner)*f,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;ctx.stroke();
  });
  for(let i=0;i<DEV_N_DIRS;i++){
    const midDeg=i*DEV_DIR_STEP;
    const a0=(midDeg-DEV_DIR_STEP/2-90)*Math.PI/180;
    const a1=(midDeg+DEV_DIR_STEP/2-90)*Math.PI/180;
    const isActive=i===_roseActiveRecSector;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rOuter,a0,a1);ctx.closePath();
    ctx.fillStyle=roseWedgeColor(counts[i],isActive&&roseBlinkOn);ctx.fill();
    ctx.strokeStyle=isActive?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.08)';
    ctx.lineWidth=isActive?1.5:0.5;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(cx,cy,rInner,0,Math.PI*2);
  ctx.fillStyle='rgba(8,8,18,0.95)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
  const DIR_NAMES_ROSE=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  for(let i=0;i<DEV_N_DIRS;i++){
    const ang=(i*DEV_DIR_STEP-90)*Math.PI/180;
    const lx=cx+Math.cos(ang)*(rOuter+10);
    const ly=cy+Math.sin(ang)*(rOuter+10);
    const done=counts[i]>=ROSE_MIN_SAMPLES;
    const partial=counts[i]>0&&!done;
    const major=i%4===0;
    ctx.fillStyle=done?'#4ade80':partial?'#fde047':'rgba(255,255,255,0.3)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=(major?'bold 8px':'6.5px')+' monospace';
    ctx.fillText(DIR_NAMES_ROSE[i],lx,ly);
  }
  const covered=counts.filter(c=>c>=ROSE_MIN_SAMPLES).length;
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 11px monospace';ctx.fillText(covered+'/'+DEV_N_DIRS,cx,cy-3);
  ctx.font='7px monospace';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('dirs',cx,cy+7);
  const total=deviationTable.reduce((s,a)=>s+a.length,0);
  const metaEl=document.getElementById('dev-rose-meta');
  if(metaEl) metaEl.textContent=total+' sample'+(total!==1?'s':'')+' · '+covered+'/'+DEV_N_DIRS+' dirs';
}

function updateRosePanel(){
  const panel=document.getElementById('dev-rose-panel');
  if(!panel) return;
  if(panel.style.display!=='none') drawDeviationRose();
}

roseBlinkTimer=setInterval(()=>{ roseBlinkOn=!roseBlinkOn; drawDeviationRose(); },500);

document.getElementById('dev-rose-close').addEventListener('click',()=>{
  document.getElementById('dev-rose-panel').style.display='none';
  const roseInd=document.getElementById('cmp-rose-indicator');
  if(roseInd){ roseInd.textContent='Show'; roseInd.style.background='rgba(138,92,246,0.12)'; }
});

document.getElementById('rose-canvas-ltg').addEventListener('click',e=>{
  const canvas=document.getElementById('rose-canvas-ltg');
  const rect=canvas.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  const cx=80,cy=80,rOuter=62,rInner=rOuter*0.22;
  const dx=px-cx,dy=py-cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<rInner||dist>rOuter) return;
  let deg=Math.atan2(dy,dx)*180/Math.PI+90;
  deg=((deg%360)+360)%360;
  const idx=Math.round(deg/DEV_DIR_STEP)%DEV_N_DIRS;
  const n=deviationTable[idx].length;
  const DIR_NAMES_ROSE=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const avg=n?(deviationTable[idx].reduce((s,v)=>s+v,0)/n):null;
  document.getElementById('devStatus').textContent=
    '🧭 '+DIR_NAMES_ROSE[idx]+': '+n+' smp'+(avg!==null?' · avg '+(avg>=0?'+':'')+avg.toFixed(1)+'°':' · no data');
});

// ── onCompass (corrected) ──────────────────────────────────────
function onCompass(e){
  let h=null;
  if(e.webkitCompassHeading!=null) h=e.webkitCompassHeading;
  else if(e.absolute&&e.alpha!=null) h=(360-e.alpha)%360;
  if(h===null||!gpsMarker) return;
  compassHeading=h;
  devTryRecord();
  const{heading:hCorr,corrected}=getCorrectedHeading(h);

  const gh=_devLastGpsHeading, spd=_devLastGpsSpeedKmh;
  const steadyElapsed=_devSteadyStart!==null?(Date.now()-_devSteadyStart)/1000:0;
  const isCharging=!corrected&&gh!==null&&spd>=DEV_SPEED_MIN&&
    Math.abs(devAngDiff(h,gh))<=5&&steadyElapsed>0&&steadyElapsed<DEV_STEADY_SEC;

  let lineColor;
  if(corrected){
    lineColor='#00ff96';
    if(gpsCompassLine&&gpsCompassLine._blinkTimer){
      clearInterval(gpsCompassLine._blinkTimer);
      gpsCompassLine._blinkTimer=null;
      gpsCompassLine.setStyle({opacity:0.85});
    }
  } else if(isCharging){
    lineColor='#ffdd00';
    if(gpsCompassLine&&!gpsCompassLine._blinkTimer){
      gpsCompassLine._blinkTimer=setInterval(()=>{
        if(!gpsCompassLine) return;
        gpsCompassLine.setStyle({opacity:gpsCompassLine.options.opacity>0.5?0.2:0.85});
      },600);
    }
  } else {
    lineColor='#ffdd00';
    if(gpsCompassLine&&gpsCompassLine._blinkTimer){
      clearInterval(gpsCompassLine._blinkTimer);
      gpsCompassLine._blinkTimer=null;
      gpsCompassLine.setStyle({opacity:0.85});
    }
  }

  _hideCompassRings();
  const ll=gpsMarker.getLatLng();
  const tip=_destPoint(ll.lat,ll.lng,hCorr,100);
  if(!gpsCompassLine) gpsCompassLine=L.polyline([[ll.lat,ll.lng],tip],{color:lineColor,weight:2.5,opacity:0.85,interactive:false,pane:'gps'}).addTo(map);
  else{ gpsCompassLine.setLatLngs([[ll.lat,ll.lng],tip]); gpsCompassLine.setStyle({color:lineColor}); }
  gpsCompassTicks.forEach(tk=>map.removeLayer(tk));gpsCompassTicks=[];
  const perp=(hCorr+90)%360;
  [25,50,75,100].forEach(dist=>{
    const mid=_destPoint(ll.lat,ll.lng,hCorr,dist);
    const a=_destPoint(mid[0],mid[1],perp,10);
    const b=_destPoint(mid[0],mid[1],(perp+180)%360,10);
    gpsCompassTicks.push(L.polyline([a,b],{color:lineColor,weight:1.5,opacity:0.7,interactive:false,pane:'gps'}).addTo(map));
    if(dist===100) gpsCompassTicks.push(L.marker(mid,{interactive:false,pane:'gps',icon:L.divIcon({className:'',html:'<span style="color:'+lineColor+';font-size:9px;font-family:monospace;white-space:nowrap;text-shadow:0 0 3px #000;">100km Compass</span>',iconAnchor:[-4,12]})}).addTo(map));
  });
}

function toggleGPS(){
  if(!gpsActive){
    if(window._fakeMarker){map.removeLayer(window._fakeMarker);window._fakeMarker=null;}
    if(window._fakeCompassLine){map.removeLayer(window._fakeCompassLine);window._fakeCompassLine=null;}
    if(window._fakeCompassTicks){window._fakeCompassTicks.forEach(tk=>map.removeLayer(tk));window._fakeCompassTicks=[];}
    gpsActive=true;
    document.getElementById('gps-btn').classList.add('searching');
    document.getElementById('gps-btn').textContent='⊕ …';
    document.getElementById('gpsStatus').textContent='⌛ Locating…';
    document.getElementById('gpsStatus').style.color='#ffaa00';
    if(!navigator.geolocation){onGPSError({code:2});gpsActive=false;return;}
    gpsWatchId=navigator.geolocation.watchPosition(onGPSSuccess,onGPSError,{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(state=>{
        if(state==='granted'){window.addEventListener('deviceorientationabsolute',onCompass,true);window.addEventListener('deviceorientation',onCompass,true);}
      }).catch(()=>{window.addEventListener('deviceorientationabsolute',onCompass,true);window.addEventListener('deviceorientation',onCompass,true);});
    }else{window.addEventListener('deviceorientationabsolute',onCompass,true);window.addEventListener('deviceorientation',onCompass,true);}
}else{
    gpsActive=false;
    const lastLL=gpsMarker?gpsMarker.getLatLng():null;
    if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
    window.removeEventListener('deviceorientationabsolute',onCompass,true);
    window.removeEventListener('deviceorientation',onCompass,true);
    if(gpsCompassLine){map.removeLayer(gpsCompassLine);gpsCompassLine=null;}
    gpsCompassTicks.forEach(tk=>map.removeLayer(tk));gpsCompassTicks=[];
    if(gpsMarker){map.removeLayer(gpsMarker);gpsMarker=null;}
    if(gpsRing){map.removeLayer(gpsRing);gpsRing=null;}
    if(gpsAccCircle){map.removeLayer(gpsAccCircle);gpsAccCircle=null;}
    if(gpsHeadingLine){gpsHeadingLine._ticks&&gpsHeadingLine._ticks.forEach(tk=>map.removeLayer(tk));map.removeLayer(gpsHeadingLine);gpsHeadingLine=null;}
    _hideCompassRings();
    _gpsPrev=null;
    document.getElementById('gps-btn').classList.remove('active','searching');
    document.getElementById('gps-btn').textContent='⊕ GPS';

// ── HKO Lightning (Hong Kong Observatory, past bins) ───────────
const HKO_URL = 'https://maps.weather.gov.hk/llis/input_files/gislatest_c2g.txt';
const HKO_PROXIES = [
  'http://orangecore.net/met/wxchart/lightningproxy.php?url=',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?url=',
  'https://api.codetabs.com/v1/proxy?quest='
];
const HKO_REFRESH_SEC = 150; // 2.5 minutes — shared by both the fetch interval and the pill countdown fillconst HKO_REFRESH_MS = HKO_REFRESH_SEC * 1000;
const HKO_RING_COLOR = '#66ccff'; // light blue ring identifies HKO-sourced dots
const HKO_MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

let hkoEnabled = false;
let hkoRefreshTimer = null;
let hkoMarkers = [];
let hkoLegendEl = null;
let hkoCountdownTimer = null;
let hkoCountdownRemaining = 0;

function hkoSetLabel(text){
  const el=document.getElementById('hko-label');
  if(el) el.textContent=text;
}

function hkoStyleForAge(ageSec){
  const s = strokeStyle(ageSec); // same age→color scale as live WS strikes
  return { fillColor:s.fillColor, fillOpacity:1, radius:s.radius, color:HKO_RING_COLOR, weight:1.0, opacity:1 };
}

function hkoParseBinEndTime(dateStr, timeRange){
  const [, endHH, endMM] = timeRange.match(/-(\d{2}):(\d{2})$/) || timeRange.match(/(\d{2}):(\d{2})$/);
  const [dd, monStr, yyyy] = dateStr.split('-');
  const mon = HKO_MONTHS[monStr];
  if(mon===undefined) return null;
  const utcMs = Date.UTC(parseInt(yyyy), mon, parseInt(dd), parseInt(endHH), parseInt(endMM), 0) - 8*3600*1000;
  return utcMs/1000;
}

function hkoClearMarkers(){
  hkoMarkers.forEach(m=>map.removeLayer(m));
  hkoMarkers=[];
}

async function hkoFetchOnce(proxy, target){
  const res = await fetch(proxy+encodeURIComponent(target), {signal:AbortSignal.timeout(8000)});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  if(!text || !text.trim()) throw new Error('empty response');
  return text;
}

async function hkoFetchWithFallback(){
  const target = HKO_URL+'?'+Date.now();
  let lastErr=null;
  for(const proxy of HKO_PROXIES){
    try{ return await hkoFetchOnce(proxy, target); }
    catch(e){ lastErr=e; console.warn('[HKO] proxy failed:', proxy, e); }
  }
  throw lastErr||new Error('all HKO proxies failed');
}

async function hkoFetchAndRender(){
  hkoSetLabel('🛰 HKO ⟳');
  try{
    const text = await hkoFetchWithFallback();
    hkoClearMarkers();
    const nowSec = Date.now()/1000;
    const lines = text.trim().split('\n').filter(Boolean);
    lines.forEach(line=>{
      const parts = line.trim().split(/\s+/);
      if(parts.length<3) return;
      const dateStr = parts[0];
      const timeRange = parts[1];
      const binEnd = hkoParseBinEndTime(dateStr, timeRange);
      if(binEnd===null) return;
const age = nowSec - binEnd;
      const style = hkoStyleForAge(age);
      for(let i=2;i+1<parts.length;i+=2){
        const lat = parseFloat(parts[i]);
        const lon = parseFloat(parts[i+1]);
        if(isNaN(lat)||isNaN(lon)) continue;
const m = L.circleMarker([lat,lon],{
          ...style,
          renderer:hkoRenderer, pane:'hko', interactive:false
        }).addTo(map);
        m._hkoBinEnd = binEnd;
        m._lat = lat; m._lon = lon;
        hkoMarkers.push(m);
      }
    });
hkoSetLabel('🛰 HKO ('+hkoMarkers.length+')');
  }catch(e){
    console.warn('[HKO]', e);
    hkoSetLabel('🛰 HKO ⚠');
  }
}

function hkoRecolor(){
  if(!hkoEnabled) return;
  const nowSec = Date.now()/1000;
  hkoMarkers.forEach(m=>{
    const age = nowSec - m._hkoBinEnd;
    m.setStyle(hkoStyleForAge(age));
  });
}

function hkoShowLegend(){ /* floating HKO legend removed — ring indicator now lives in the bottom status bar */ }

function hkoHideLegend(){ /* no-op */ }

function hkoStartCountdown(){
  hkoCountdownRemaining = HKO_REFRESH_SEC;
  const fill=document.getElementById('hko-fill');
  if(fill){ fill.style.transition='none'; fill.style.transform='scaleX(1)'; void fill.offsetWidth; fill.style.transition='transform 1s linear'; }
  if(hkoCountdownTimer) clearInterval(hkoCountdownTimer);
  hkoCountdownTimer = setInterval(()=>{
    hkoCountdownRemaining--;
    if(fill) fill.style.transform='scaleX('+Math.max(0,hkoCountdownRemaining/HKO_REFRESH_SEC)+')';
    if(hkoCountdownRemaining<=0){
      clearInterval(hkoCountdownTimer); hkoCountdownTimer=null;
      hkoFetchAndRender().then(hkoStartCountdown);
    }
  },1000);
}

function hkoStopCountdown(){
  if(hkoCountdownTimer){ clearInterval(hkoCountdownTimer); hkoCountdownTimer=null; }
  const fill=document.getElementById('hko-fill');
  if(fill){ fill.style.transition='none'; fill.style.transform='scaleX(0)'; }
}

function hkoEnable(){
  hkoEnabled=true;
  document.getElementById('hko-toggle').classList.add('active');
  hkoShowLegend();
  hkoFetchAndRender().then(hkoStartCountdown);
}

function hkoDisable(){
  hkoEnabled=false;
  document.getElementById('hko-toggle').classList.remove('active');
  hkoSetLabel('🛰 HKO');
  hkoHideLegend();
  if(hkoRefreshTimer){ clearInterval(hkoRefreshTimer); hkoRefreshTimer=null; }
  hkoStopCountdown();
  hkoClearMarkers();
}

document.getElementById('hko-toggle').addEventListener('click',()=>{
  if(hkoEnabled) hkoDisable(); else hkoEnable();
});

setInterval(hkoRecolor, 2000);

// Auto-start HKO on load
hkoEnable();

// ── WebSocket — HK/SE Asia focused bbox ───────────────────────
// Subscribe to a tight SE Asia bbox for dense regional data
const SEA_BBOX=[28,141,-11,92];

function connect(){
  const srv=['live.lightningmaps.org','live2.lightningmaps.org'][Math.floor(Math.random()*2)];
  document.getElementById('connStatus').textContent='Connecting…';
  document.getElementById('connStatus').style.color='#ffaa00';
  try{ws=new WebSocket('wss://'+srv+':443/');}
  catch(e){document.getElementById('connStatus').textContent='WebSocket blocked';document.getElementById('connStatus').style.color='#ff4444';return;}
  ws.onopen=()=>{
    document.getElementById('connStatus').style.color='#00ff99';
    document.getElementById('connStatus').textContent='Live';
    ws.send(JSON.stringify({v:24,i:{},s:false,x:0,w:0,tx:0,tw:0,a:4,z:map.getZoom(),b:true,h:'',l:0,t:0,from_lightningmaps_org:true,p:SEA_BBOX}));
  };
  ws.onmessage=(event)=>{
    try{
      const msg=JSON.parse(event.data);
      if(msg.time)t=msg.time;
      if(msg.strokes)msg.strokes.forEach(s=>{
        try{
          if(s&&s.lat&&s.lon){
            const time=s.time?s.time/1000:Date.now()/1000;
            if((t||Date.now()/1000)-time<=86400)addStroke(parseFloat(s.lat),parseFloat(s.lon),time);
            if(s.del)document.getElementById('delay').textContent='Delay: '+(s.del/1000).toFixed(1)+'s';
          }
        }catch(se){console.warn('[stroke]',se);}
      });
    }catch(e){}
  };
  ws.onerror=()=>{document.getElementById('connStatus').textContent='Error — retrying…';document.getElementById('connStatus').style.color='#ff4444';};
  ws.onclose=()=>{document.getElementById('connStatus').textContent='Reconnecting…';document.getElementById('connStatus').style.color='#ffaa00';setTimeout(connect,5000);};
}

setInterval(()=>{
  if(ws&&ws.readyState===1){
    const b=map.getBounds();
    ws.send(JSON.stringify({v:24,i:{},s:false,a:4,z:map.getZoom(),b:true,h:'',l:1,t,from_lightningmaps_org:true,p:[b.getNorthEast().lat,b.getNorthEast().lng,b.getSouthWest().lat,b.getSouthWest().lng]}));
  }
},5000);

connect();

async function fetchAndDrawWeather(lat, lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&hourly=temperature_2m,relative_humidity_2m,windspeed_10m,winddirection_10m,precipitation,cloudcover`+
    `&models=ecmwf_ifs025`+
    `&forecast_days=5&timezone=Asia%2FHong_Kong`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(data.error){throw new Error(data.reason||'API error');}
    const h=data.hourly;
    // Downsample to every 3rd hour
    const times=[],temp=[],rh=[],ws=[],wd=[],precip=[],cloud=[];
    for(let i=0;i<h.time.length;i+=3){
      times.push(h.time[i]);
      temp.push(h.temperature_2m[i]);
      rh.push(h.relative_humidity_2m[i]);
      ws.push(h.windspeed_10m[i]);
      wd.push(h.winddirection_10m[i]);
      // Sum precip over 3-hr block
      let p=0;for(let j=i;j<Math.min(i+3,h.precipitation.length);j++)p+=(h.precipitation[j]||0);
      precip.push(parseFloat(p.toFixed(2)));
      cloud.push(h.cloudcover[i]);
    }
    const labels=times.map(t=>{
      const d=new Date(t);
      const dd=String(d.getDate()).padStart(2,'0');
      const hh=String(d.getHours()).padStart(2,'0');
      return dd+'/'+hh;
    });
    document.getElementById('wx-subtitle').textContent=`ECMWF · 5-day · 3-hr · HKT · ${data.hourly_units?.temperature_2m||'°C'}`;
drawWeatherChart(labels,times,temp,rh,ws,precip,cloud,wd);
  }catch(e){
    const errEl=document.getElementById('wx-error');
    if(errEl){errEl.style.display='block';errEl.textContent='Failed to load: '+e.message;}
    const sub=document.getElementById('wx-subtitle');
    if(sub)sub.textContent='Error loading forecast';
  }
}

function drawWeatherChart(labels,times,temp,rh,ws,precip,cloud,wd){
  if(!window.Chart){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
    s.onload=()=>_renderChart(labels,times,temp,rh,ws,precip,cloud,wd);
    document.head.appendChild(s);
  }else _renderChart(labels,times,temp,rh,ws,precip,cloud,wd);
}

yW:{position:'right',min:0,max:window._wxKnots?40:74,title:{display:true,text:window._wxKnots?'kt':'km/h',color:'#ffdd00',font:{size:10}},ticks:{color:'#ffdd00',font:{size:9}},grid:{display:false},offset:true},

function drawWindArrows(labels,ws,wd,xScale){
  const canvas=document.getElementById('wx-wind-chart');
  if(!canvas)return;
  const W=(xScale&&xScale.chart&&xScale.chart.width)||canvas.offsetWidth||640;
  canvas.width=W; canvas.height=100;
  const ctx2=canvas.getContext('2d');
  ctx2.clearRect(0,0,W,100);
  const n=labels.length;
  const step=W/n;
  const getX=i=>xScale?xScale.getPixelForValue(i):(step*i+step/2);
  const unitLabel=window._wxKnots?'kt':'km/h';
  const thresholds=window._wxKnots?[8,16,27,34]:[15,30,50,63];

  ctx2.font='8px Courier New';
  ctx2.textAlign='center';

  for(let i=0;i<n;i++){
    const x=getX(i);
    const y=44;
    const spdKmh=ws[i]||0;
    const spd=window._wxKnots?spdKmh*0.539957:spdKmh;
    const dir=((wd[i]||0)+180)*Math.PI/180;
    const len=Math.min(10+spd*0.5,28);
    const col=spd<thresholds[0]?'#44ff99':spd<thresholds[1]?'#ffdd00':spd<thresholds[2]?'#ff8800':'#ff3300';

    const lbl=labels[i]||'';
    const hh=lbl.slice(-2);
    if(['00','06','12','18'].includes(hh)){
      ctx2.strokeStyle=lbl.endsWith('/00')?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.06)';
      ctx2.lineWidth=lbl.endsWith('/00')?1.5:0.5;
      ctx2.beginPath();ctx2.moveTo(x,0);ctx2.lineTo(x,100);ctx2.stroke();
    }

    ctx2.save();
    ctx2.translate(x,y);
    ctx2.rotate(dir);
    ctx2.strokeStyle=col;
    ctx2.lineWidth=1.5;
    ctx2.beginPath();ctx2.moveTo(0,len/2);ctx2.lineTo(0,-len/2);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(0,-len/2);ctx2.lineTo(-3.5,-len/2+6);ctx2.stroke();
    ctx2.beginPath();ctx2.moveTo(0,-len/2);ctx2.lineTo(3.5,-len/2+6);ctx2.stroke();
    ctx2.restore();

    ctx2.fillStyle=col;
    ctx2.fillText(Math.round(spd),x,y+18);
  }

  ctx2.font='9px Courier New';
  ctx2.textAlign='left';
  ctx2.fillStyle='#556';
  ctx2.fillText('Wind ('+unitLabel+') · arrow = wind flow',4,10);

  const cols=['#44ff99','#ffdd00','#ff8800','#ff3300'];
  const lbls=window._wxKnots?['<8kt','<16kt','<27kt','>27kt']:['<15','<30','<50','>50'];
  let cx=4;
  lbls.forEach((l,i)=>{
    ctx2.fillStyle=cols[i];
    ctx2.fillRect(cx,88,8,8);
    ctx2.fillStyle='#778';
    ctx2.fillText(l,cx+10,96);
    cx+=42;
  });
}

// ── iOS compass prompt ─────────────────────────────────────────
(function initCompassPrompt(){
  if(typeof DeviceOrientationEvent==='undefined'||typeof DeviceOrientationEvent.requestPermission!=='function'){
    window.addEventListener('deviceorientationabsolute',onCompass,true);
    window.addEventListener('deviceorientation',onCompass,true);
    return;
  }
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,18,0.82);backdrop-filter:blur(6px);font-family:\'Courier New\',monospace;';
  overlay.innerHTML='<div style="font-size:52px;margin-bottom:16px;">🧭</div><div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;">Activate Compass</div><div style="font-size:12px;color:#888;margin-bottom:28px;text-align:center;max-width:240px;line-height:1.7;">Allows the map to show your heading in real time.</div><button id="compass-activate-btn" style="background:rgba(0,255,150,0.12);border:1.5px solid #00ff96;color:#00ff96;font-size:15px;font-family:\'Courier New\',monospace;padding:14px 40px;border-radius:14px;cursor:pointer;">⊕ Enable Compass</button><div id="compass-denied-msg" style="display:none;margin-top:16px;font-size:11px;color:#ff6b35;text-align:center;max-width:240px;line-height:1.7;">Permission denied. Enable Motion &amp; Orientation in Safari Settings.</div>';
  document.body.appendChild(overlay);
  document.getElementById('compass-activate-btn').addEventListener('click',()=>{
    DeviceOrientationEvent.requestPermission().then(state=>{
      if(state==='granted'){
        window.addEventListener('deviceorientationabsolute',onCompass,true);
        window.addEventListener('deviceorientation',onCompass,true);
        overlay.style.opacity='0';overlay.style.transition='opacity 0.4s';
        setTimeout(()=>overlay.remove(),400);
      }else document.getElementById('compass-denied-msg').style.display='block';
    }).catch(()=>document.getElementById('compass-denied-msg').style.display='block');
  });
})();
</script>
